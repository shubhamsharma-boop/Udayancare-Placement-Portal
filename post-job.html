<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Post Job | Udayan Care Placement Portal</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">

        <div class="sidebar-logo">

            <img src="images/logo.png" alt="Logo">

            <h3>Employer Panel</h3>

        </div>

        <ul>

            <li>
                <a href="employer-dashboard.html">
                    <i class="fa-solid fa-house"></i>
                    Dashboard
                </a>
            </li>

            <li>
                <a href="company-profile.html">
                    <i class="fa-solid fa-building"></i>
                    Company Profile
                </a>
            </li>

            <li class="active">
                <a href="#">
                    <i class="fa-solid fa-plus"></i>
                    Post Job
                </a>
            </li>

            <li>
                <a href="manage-jobs.html">
                    <i class="fa-solid fa-briefcase"></i>
                    Manage Jobs
                </a>
            </li>

            <li>
                <a href="applications.html">
                    <i class="fa-solid fa-users"></i>
                    Applications
                </a>
            </li>

            <li>
                <a href="shortlisted.html">
                    <i class="fa-solid fa-user-check"></i>
                    Shortlisted
                </a>
            </li>

        </ul>

    </aside>

    <!-- ================= MAIN ================= -->

    <main class="dashboard-content">

        <div class="dashboard-header">

            <div>

                <h2>Post a New Job</h2>

                <p>Create a new job opportunity for Udayan Care candidates.</p>

            </div>

        </div>

        <form id="postJobForm">

            <!-- Basic Details -->

            <div class="dashboard-box">

                <h3>Job Information</h3>

                <div class="form-grid">

                    <div class="form-group">

                        <label>Job Title *</label>

                        <input type="text" required>

                    </div>

                    <div class="form-group">

                        <label>Employment Type *</label>

                        <select required>

                            <option>Full Time</option>
                            <option>Part Time</option>
                            <option>Internship</option>
                            <option>Contract</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label>Industry *</label>

                        <select required></select>

                    </div>

                    <div class="form-group">

                        <label>No. of Vacancies *</label>

                        <input type="number" required>

                    </div>

                </div>

            </div>

            <!-- Location -->

            <div class="dashboard-box">

                <h3>Job Location</h3>

                <div class="form-grid">

                    <div class="form-group">

                        <label>State</label>

                        <select></select>

                    </div>

                    <div class="form-group">

                        <label>District</label>

                        <select></select>

                    </div>

                    <div class="form-group">

                        <label>City</label>

                        <input type="text">

                    </div>

                    <div class="form-group">

                        <label>Work Mode</label>

                        <select>

                            <option>On-site</option>
                            <option>Hybrid</option>
                            <option>Remote</option>

                        </select>

                    </div>

                </div>

            </div>

            <!-- Salary -->

            <div class="dashboard-box">

                <h3>Salary & Experience</h3>

                <div class="form-grid">

                    <div class="form-group">

                        <label>Minimum Salary</label>

                        <input type="number">

                    </div>

                    <div class="form-group">

                        <label>Maximum Salary</label>

                        <input type="number">

                    </div>

                    <div class="form-group">

                        <label>Experience Required</label>

                        <select></select>

                    </div>

                    <div class="form-group">

                        <label>Qualification</label>

                        <select></select>

                    </div>

                </div>

            </div>

            <!-- Description -->

            <div class="dashboard-box">

                <h3>Job Description</h3>

                <textarea rows="6"></textarea>

            </div>

            <div class="dashboard-box">

                <h3>Key Responsibilities</h3>

                <textarea rows="5"></textarea>

            </div>

            <div class="dashboard-box">

                <h3>Required Skills</h3>

                <textarea rows="5"></textarea>

            </div>

            <!-- Dates -->

            <div class="dashboard-box">

                <div class="form-grid">

                    <div class="form-group">

                        <label>Application Deadline</label>

                        <input type="date">

                    </div>

                    <div class="form-group">

                        <label>Hiring Status</label>

                        <select>

                            <option>Active</option>
                            <option>Draft</option>
                            <option>Closed</option>

                        </select>

                    </div>

                </div>

            </div>

            <!-- Buttons -->

            <div class="dashboard-box text-center">

                <button
                    type="submit"
                    class="btn btn-primary">

                    <i class="fa-solid fa-paper-plane"></i>

                    Publish Job

                </button>

                <button
                    type="reset"
                    class="btn btn-outline">

                    Reset

                </button>

            </div>

        </form>

    </main>

</div>

<script src="js/app.js"></script>

</body>

</html>
