<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Employer Registration | Udayan Care Placement Portal</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- Header -->
    <!-- Copy Same Header From index.html -->

    <!-- ================= PAGE BANNER ================= -->

    <section class="page-banner">

        <div class="container">

            <h1>Employer Registration</h1>

            <p>Home / Employer Register</p>

        </div>

    </section>

    <!-- ================= REGISTRATION ================= -->

    <section class="register-section">

        <div class="container">

            <div class="register-card">

                <div class="section-title">

                    <span>Employer Registration</span>

                    <h2>Hire Skilled & Job-Ready Talent</h2>

                    <p>
                        Register your organization to post jobs, manage applications,
                        and connect with verified candidates through the Udayan Care
                        Placement Portal.
                    </p>

                </div>

                <form id="employerRegisterForm">

                    <div class="form-grid">

                        <!-- Company Name -->

                        <div class="form-group">

                            <label>Company Name <span>*</span></label>

                            <input
                                type="text"
                                id="companyName"
                                placeholder="Enter Company Name"
                                required>

                        </div>

                        <!-- HR Name -->

                        <div class="form-group">

                            <label>HR / Contact Person <span>*</span></label>

                            <input
                                type="text"
                                id="hrName"
                                placeholder="Enter Contact Person Name"
                                required>

                        </div>

                        <!-- Designation -->

                        <div class="form-group">

                            <label>Designation</label>

                            <input
                                type="text"
                                id="designation"
                                placeholder="HR Manager">

                        </div>

                        <!-- Mobile -->

                        <div class="form-group">

                            <label>Mobile Number <span>*</span></label>

                            <input
                                type="tel"
                                id="mobile"
                                maxlength="10"
                                placeholder="9876543210"
                                required>

                        </div>

                        <!-- Email -->

                        <div class="form-group">

                            <label>Email Address <span>*</span></label>

                            <input
                                type="email"
                                id="email"
                                placeholder="hr@company.com"
                                required>

                        </div>

                        <!-- Website -->

                        <div class="form-group">

                            <label>Company Website</label>

                            <input
                                type="url"
                                id="website"
                                placeholder="https://www.company.com">

                        </div>

                        <!-- State -->

                        <div class="form-group">

                            <label>State</label>

                            <select id="state">

                                <option value="">Select State</option>

                            </select>

                        </div>

                        <!-- City -->

                        <div class="form-group">

                            <label>City</label>

                            <input
                                type="text"
                                id="city"
                                placeholder="Enter City">

                        </div>

                        <!-- Password -->

                        <div class="form-group">

                            <label>Password <span>*</span></label>

                            <input
                                type="password"
                                id="password"
                                placeholder="Create Password"
                                required>

                        </div>

                        <!-- Confirm Password -->

                        <div class="form-group">

                            <label>Confirm Password <span>*</span></label>

                            <input
                                type="password"
                                id="confirmPassword"
                                placeholder="Confirm Password"
                                required>

                        </div>

                    </div>

                    <!-- Terms -->

                    <div class="checkbox-group">

                        <label>

                            <input type="checkbox" required>

                            I agree to the Privacy Policy &
                            Terms and Conditions.

                        </label>

                    </div>

                    <!-- Register -->

                    <button
                        type="submit"
                        class="btn btn-primary register-btn">

                        Register Company

                    </button>

                    <!-- Login -->

                    <div class="login-link">

                        Already Registered?

                        <a href="employer-login.html">

                            Login Here

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </section>

    <!-- Footer -->
    <!-- Copy Same Footer From index.html -->

    <script src="js/app.js"></script>

</body>

</html>
