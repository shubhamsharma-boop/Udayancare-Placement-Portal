<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Employer Login | Udayan Care Placement Portal</title>

    <meta name="description"
        content="Employer login to manage company profile, post jobs and hire verified candidates.">

    <link rel="icon" href="images/favicon.ico">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Header -->
    <!-- Copy Same Header From index.html -->

    <!-- ================= PAGE BANNER ================= -->

    <section class="page-banner">

        <div class="container">

            <h1>Employer Login</h1>

            <p>Home / Employer Login</p>

        </div>

    </section>

    <!-- ================= LOGIN ================= -->

    <section class="login-section">

        <div class="container">

            <div class="login-card">

                <div class="section-title">

                    <span>Welcome Back</span>

                    <h2>Employer Login</h2>

                    <p>
                        Login to manage your company profile, post jobs,
                        review applications and hire skilled candidates.
                    </p>

                </div>

                <form id="employerLoginForm">

                    <!-- Email -->

                    <div class="form-group">

                        <label>Email Address</label>

                        <input
                            type="email"
                            id="loginEmail"
                            placeholder="Enter your registered email"
                            required>

                    </div>

                    <!-- Password -->

                    <div class="form-group">

                        <label>Password</label>

                        <input
                            type="password"
                            id="loginPassword"
                            placeholder="Enter your password"
                            required>

                    </div>

                    <!-- Remember -->

                    <div class="login-options">

                        <label>

                            <input type="checkbox">

                            Remember Me

                        </label>

                        <a href="forgot-password.html">

                            Forgot Password?

                        </a>

                    </div>

                    <!-- Login Button -->

                    <button
                        type="submit"
                        class="btn btn-primary login-btn">

                        Login

                    </button>

                    <!-- Register -->

                    <div class="login-link">

                        Don't have an employer account?

                        <a href="employer-register.html">

                            Register Company

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </section>

    <!-- Footer -->
    <!-- Copy Same Footer From index.html -->

    <script src="js/app.js"></script>

</body>

</html>
