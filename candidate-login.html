<body>


<!-- HEADER -->

<header class="header">

<div class="container navbar">


<div class="logo">

<img src="images/logo.png">

UCPP

<nav class="nav-menu">

<a href="jobs.html">

</nav>

<!-- LOGIN SECTION -->


<section class="login-section">


<div class="container">



<div class="login-card">



<div class="section-title">


<span>
Candidate Portal
</span>


<h2>
Welcome Back
</h2>


<p>
Login to access your profile and job opportunities.
</p>


</div>




<form>



<div class="form-group">


<label>
Mobile Number / Email
</label>


<input 
type="text"
placeholder="Enter mobile number or email"
>


</div>





<div class="form-group">


<label>
Password
</label>


<input 
type="password"
placeholder="Enter password"
>


</div>





<div class="login-options">


<label>

<input type="checkbox">

Remember me

</label>



<a href="#">
Forgot Password?
</a>


</div>





<button 
type="button"
class="btn btn-primary login-btn"
onclick="candidateLogin()"
>


<i class="fa-solid fa-right-to-bracket"></i>

Login


</button>



</form>





<p class="mt-20 text-center">


New Candidate?

<a href="candidate-register.html"
style="color:#0A7C66;font-weight:600;">

Create Account

</a>
