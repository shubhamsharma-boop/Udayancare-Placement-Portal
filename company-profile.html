<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Company Profile | Udayan Care Placement Portal</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">

        <div class="sidebar-logo">

            <img src="images/logo.png" alt="Logo">

            <h3>Employer Panel</h3>

        </div>

        <ul>

            <li>
                <a href="employer-dashboard.html">
                    <i class="fa-solid fa-house"></i>
                    Dashboard
                </a>
            </li>

            <li class="active">
                <a href="#">
                    <i class="fa-solid fa-building"></i>
                    Company Profile
                </a>
            </li>

            <li>
                <a href="post-job.html">
                    <i class="fa-solid fa-plus"></i>
                    Post Job
                </a>
            </li>

            <li>
                <a href="manage-jobs.html">
                    <i class="fa-solid fa-briefcase"></i>
                    Manage Jobs
                </a>
            </li>

            <li>
                <a href="applications.html">
                    <i class="fa-solid fa-users"></i>
                    Applications
                </a>
            </li>

            <li>
                <a href="shortlisted.html">
                    <i class="fa-solid fa-user-check"></i>
                    Shortlisted
                </a>
            </li>

            <li>
                <a href="employer-settings.html">
                    <i class="fa-solid fa-gear"></i>
                    Settings
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Logout
                </a>
            </li>

        </ul>

    </aside>

    <!-- ================= MAIN ================= -->

    <main class="dashboard-content">

        <!-- Header -->

        <div class="dashboard-header">

            <div>

                <h2>Company Profile</h2>

                <p>
                    Update your organization details to attract the right candidates.
                </p>

            </div>

        </div>

        <!-- Company Information -->

        <div class="dashboard-box">

            <h3>Company Information</h3>

            <div class="form-grid">

                <div class="form-group">

                    <label>Company Name</label>

                    <input
                        type="text"
                        value="ABC Pvt. Ltd.">

                </div>

                <div class="form-group">

                    <label>Industry</label>

                    <select>

                        <option>Information Technology</option>
                        <option>BPO</option>
                        <option>Retail</option>
                        <option>Healthcare</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Company Website</label>

                    <input
                        type="url"
                        value="https://www.company.com">

                </div>

                <div class="form-group">

                    <label>Company Size</label>

                    <select>

                        <option>1-10 Employees</option>
                        <option>11-50 Employees</option>
                        <option>51-200 Employees</option>
                        <option>200+ Employees</option>

                    </select>

                </div>

            </div>

        </div>

        <!-- HR Contact -->

        <div class="dashboard-box">

            <h3>HR Contact Details</h3>

            <div class="form-grid">

                <div class="form-group">

                    <label>HR Name</label>

                    <input type="text">

                </div>

                <div class="form-group">

                    <label>Designation</label>

                    <input type="text">

                </div>

                <div class="form-group">

                    <label>Mobile Number</label>

                    <input type="tel">

                </div>

                <div class="form-group">

                    <label>Email Address</label>

                    <input type="email">

                </div>

            </div>

        </div>

        <!-- Office Address -->

        <div class="dashboard-box">

            <h3>Office Address</h3>

            <div class="form-grid">

                <div class="form-group">

                    <label>State</label>

                    <select></select>

                </div>

                <div class="form-group">

                    <label>District</label>

                    <select></select>

                </div>

                <div class="form-group">

                    <label>City</label>

                    <input type="text">

                </div>

                <div class="form-group">

                    <label>Pincode</label>

                    <input type="text">

                </div>

            </div>

        </div>

        <!-- About Company -->

        <div class="dashboard-box">

            <h3>About Company</h3>

            <div class="form-group">

                <textarea
                    rows="6"
                    placeholder="Write a brief company profile..."></textarea>

            </div>

        </div>

        <!-- Save -->

        <div class="dashboard-box text-center">

            <button
                class="btn btn-primary">

                <i class="fa-solid fa-floppy-disk"></i>

                Save Company Profile

            </button>

        </div>

    </main>

</div>

<script src="js/app.js"></script>

</body>

</html>
