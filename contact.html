<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | Udayan Care Placement Portal</title>

    <meta name="description"
        content="Get in touch with the Udayan Care Placement Portal team for placement, recruitment and partnership enquiries.">

    <link rel="icon" href="images/favicon.ico">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Header -->
    <!-- Copy same header from index.html -->
    <!-- Make Contact menu active -->

    <!-- ================= PAGE BANNER ================= -->

    <section class="page-banner">

        <div class="container">

            <h1>Contact Us</h1>

            <p>Home / Contact</p>

        </div>

    </section>

    <!-- ================= CONTACT ================= -->

    <section class="contact-section">

        <div class="container">

            <div class="contact-wrapper">

                <!-- Left -->

                <div class="contact-info">

                    <h2>Let's Connect</h2>

                    <p>

                        Have questions about placements, hiring, partnerships,
                        or the Udayan Care Placement Portal? We'd be happy to help.

                    </p>

                    <div class="info-item">

                        <i class="fa-solid fa-location-dot"></i>

                        <div>

                            <strong>Address</strong>

                            <p>
                                Udayan Care, New Delhi, India
                            </p>

                        </div>

                    </div>

                    <div class="info-item">

                        <i class="fa-solid fa-envelope"></i>

                        <div>

                            <strong>Email</strong>

                            <p>info@udayancare.org</p>

                        </div>

                    </div>

                    <div class="info-item">

                        <i class="fa-solid fa-phone"></i>

                        <div>

                            <strong>Phone</strong>

                            <p>+91-XXXXXXXXXX</p>

                        </div>

                    </div>

                    <div class="info-item">

                        <i class="fa-solid fa-clock"></i>

                        <div>

                            <strong>Office Hours</strong>

                            <p>Monday - Friday | 9:30 AM - 6:00 PM</p>

                        </div>

                    </div>

                </div>

                <!-- Right -->

                <div class="contact-form">

                    <form id="contactForm">

                        <input
                            type="text"
                            name="name"
                            placeholder="Full Name"
                            required>

                        <input
                            type="tel"
                            name="mobile"
                            placeholder="Mobile Number"
                            required>

                        <input
                            type="email"
                            name="email"
                            placeholder="Email Address"
                            required>

                        <input
                            type="text"
                            name="state"
                            placeholder="State">

                        <input
                            type="text"
                            name="district"
                            placeholder="District">

                        <select
                            name="userType"
                            required>

                            <option value="">I am</option>

                            <option value="Candidate">
                                Candidate
                            </option>

                            <option value="Employer">
                                Employer
                            </option>

                            <option value="Other">
                                Other
                            </option>

                        </select>

                        <textarea
                            name="message"
                            rows="5"
                            placeholder="Write your message..."
                            required></textarea>

                        <button
                            type="submit"
                            class="btn btn-primary">

                            Submit Enquiry

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </section>

    <!-- ================= GOOGLE MAP ================= -->

    <section class="map-section">

        <div class="container">

            <iframe
                src="https://www.google.com/maps/embed?pb="
                width="100%"
                height="400"
                style="border:0;"
                loading="lazy"
                allowfullscreen>
            </iframe>

        </div>

    </section>

    <!-- Footer -->
    <!-- Copy same footer from index.html -->

    <script src="js/app.js"></script>

</body>

</html>
