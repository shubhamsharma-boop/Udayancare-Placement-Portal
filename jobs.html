<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jobs | Udayan Care Placement Portal</title>

    <meta name="description"
        content="Explore verified job opportunities through the Udayan Care Placement Portal.">

    <link rel="icon" href="images/favicon.ico">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Header -->
    <!-- Copy same header from index.html -->
    <!-- Make Jobs menu active -->

    <!-- ================= PAGE BANNER ================= -->

    <section class="page-banner">

        <div class="container">

            <h1>Available Jobs</h1>

            <p>Home / Jobs</p>

        </div>

    </section>

    <!-- ================= SEARCH & FILTER ================= -->

    <section class="job-search">

        <div class="container">

            <form class="search-box">

                <input type="text"
                    placeholder="Search Job Title, Company or Keyword">

                <select>

                    <option>All Locations</option>
                    <option>Delhi</option>
                    <option>Noida</option>
                    <option>Gurugram</option>
                    <option>Faridabad</option>

                </select>

                <select>

                    <option>Experience</option>
                    <option>Fresher</option>
                    <option>0-1 Year</option>
                    <option>1-3 Years</option>

                </select>

                <button class="btn btn-primary">

                    <i class="fa-solid fa-magnifying-glass"></i>

                    Search

                </button>

            </form>

        </div>

    </section>

    <!-- ================= JOB LIST ================= -->

    <section class="featured-jobs">

        <div class="container">

            <div class="jobs-grid">

                <!-- Job Card -->

                <div class="job-card">

                    <div class="job-header">

                        <h3>Customer Support Executive</h3>

                        <span class="job-type">Full Time</span>

                    </div>

                    <ul class="job-details">

                        <li>
                            <i class="fa-solid fa-building"></i>
                            ABC Pvt. Ltd.
                        </li>

                        <li>
                            <i class="fa-solid fa-location-dot"></i>
                            Noida
                        </li>

                        <li>
                            <i class="fa-solid fa-indian-rupee-sign"></i>
                            ₹18,000 - ₹22,000
                        </li>

                        <li>
                            <i class="fa-solid fa-briefcase"></i>
                            Fresher
                        </li>

                    </ul>

                    <a href="candidate-login.html"
                        class="btn btn-primary">

                        Apply Now

                    </a>

                </div>

                <!-- Duplicate this card dynamically from API later -->

            </div>

        </div>

    </section>

    <!-- ================= NO JOB FOUND ================= -->

    <section class="text-center d-none" id="noJobs">

        <div class="container">

            <img src="images/no-job.svg"
                alt="No Jobs"
                style="max-width:300px;margin:auto;">

            <h2>No Jobs Available</h2>

            <p>

                New opportunities will be published soon.

            </p>

        </div>

    </section>

    <!-- Footer -->
    <!-- Copy same footer from index.html -->

    <script src="js/app.js"></script>

</body>

</html>
